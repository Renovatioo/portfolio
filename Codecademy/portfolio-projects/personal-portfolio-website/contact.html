<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Sebastian Hultman Portfolio</title>
  <!-- Update the query string when CSS changes so GitHub Pages/Chrome do not serve an old cached file. -->
  <link rel="stylesheet" href="styles.css?v=shared-layout">
</head>
<body>
  <!-- Decorative animated background. It is hidden from screen readers and controlled from script.js. -->
  <canvas id="background-canvas" aria-hidden="true"></canvas>

  <!-- Shared header is rendered from script.js so all pages use one navigation source. -->
  <div id="site-header"></div>

  <main>
    <!-- Contact is intentionally its own page, but uses the same grid rhythm as the home hero. -->
    <section class="contact-page">
      <div>
        <p class="eyebrow">Contact</p>
        <h1>Let's build something useful.</h1>
        <p>
          You can reach me by email, phone, or GitHub. I am always interested
          in learning more and improving my projects.
        </p>
      </div>

      <div class="contact-card">
        <img class="profile-photo" src="images/sebastian-profile.png" alt="Portrait of Sebastian Hultman">
        <h2>Sebastian Hultman</h2>
        <p>Email: <a href="mailto:sebastian.hultman@hotmail.com">sebastian.hultman@hotmail.com</a></p>
        <p>Phone: <a href="tel:+46763106602">076-310 66 02</a></p>
        <p>GitHub: <a href="https://github.com/Renovatioo">github.com/Renovatioo</a></p>
      </div>
    </section>
  </main>

  <!-- Shared footer is rendered from script.js for the same reason as the header. -->
  <div id="site-footer"></div>

  <!-- Update the query string when JavaScript changes for the same cache reason as the CSS link. -->
  <script src="script.js?v=shared-layout"></script>
</body>
</html>
